syntax = "proto3";

package order.v1;

option go_package = "microservices/rpc/proto/order/v1;orderv1";

service OrderService {
  rpc GetGoodById(GetGoodByIdRequest) returns (GetGoodByIdResponse);

}


message GetGoodByIdRequest {
  int64 user_id = 1;
}

message GetGoodByIdResponse {
  int64 user_id = 1;
  int64 order_count = 2;
  string status = 3;
}