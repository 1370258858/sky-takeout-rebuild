syntax = "proto3";

package delivery.v1;

option go_package = "microservices/rpc/proto/delivery/v1;deliveryv1";

service DeliveryService {
  rpc AssignRider(AssignRiderRequest) returns (AssignRiderResponse);
  rpc RiderAction(RiderActionRequest) returns (RiderActionResponse);
}

message AssignRiderRequest {
  int64 order_id = 1;
}

message AssignRiderResponse {
  int64 rider_id = 1;
  string status = 2;
}

message RiderActionRequest {
  int64 order_id = 1;
  int64 rider_id = 2;
  string action = 3; // accept or reject
}

message RiderActionResponse {
  bool success = 1;
}